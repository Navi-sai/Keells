version: '3.8'

services:

  mysql2:
    image: mysql:8
    container_name: mysql2-db

    environment:
      MYSQL_ROOT_PASSWORD: Blossom@12
      MYSQL_DATABASE: KeellsSmartGrocery

    ports:
      - "3308:3306"

  keellsmartgrocery:
    build: .
    container_name: keellsmartgrocery-app

    depends_on:
      - mysql2

    ports:
      - "8080:8080"